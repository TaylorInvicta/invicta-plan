name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect project type
        id: detect
        run: |
          if [ -f "package.json" ] && grep -q '"build"' package.json; then
            echo "type=node" >> $GITHUB_OUTPUT
          else
            echo "type=static" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install and build
        if: steps.detect.outputs.type == 'node'
        run: npm ci && npm run build

      - name: Detect build output directory
        if: steps.detect.outputs.type == 'node'
        id: builddir
        run: |
          if   [ -d "dist"  ]; then echo "dir=dist"  >> $GITHUB_OUTPUT
          elif [ -d "out"   ]; then echo "dir=out"   >> $GITHUB_OUTPUT
          elif [ -d "build" ]; then echo "dir=build" >> $GITHUB_OUTPUT
          else                      echo "dir=."     >> $GITHUB_OUTPUT
          fi

      - name: Set deploy source directory
        run: |
          if [ "${{ steps.detect.outputs.type }}" = "node" ]; then
            echo "DEPLOY_DIR=${{ steps.builddir.outputs.dir }}" >> $GITHUB_ENV
          else
            echo "DEPLOY_DIR=." >> $GITHUB_ENV
          fi

      - name: Deploy via rsync
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DROPLET_IP" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            "$DEPLOY_DIR/" \
            "deploy@$DROPLET_IP:$PROJECT_NAME/"

      - name: Smoke test
        env:
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://$PROJECT_NAME.twototango.com.au)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ https://$PROJECT_NAME.twototango.com.au is live (HTTP $HTTP_STATUS)"
          else
            echo "❌ Smoke test failed — got HTTP $HTTP_STATUS"
            exit 1
          fi
